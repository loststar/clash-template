# 基于 ACL4SSR GeneralClashConfig.yml，增加 DNS 配置解决 LinkedIn 跳转中国站问题
# 参考: https://blog.clash-plus.com/post/clash-linkedin-com-no-cn/

mixed-port: 7890
socks-port: 7891
allow-lan: true
bind-address: "*"
ipv6: true
log-level: info
external-controller: '127.0.0.1:9090'

experimental:
  ignore-resolve-fail: true

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - localhost.ptlogin2.qq.com
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - 8.8.8.8
    - 1.1.1.1
    - tls://1.0.0.1:853
    - tls://dns.google:853
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    domain:
      - +.linkedin.com

cfw-latency-timeout: 3000
cfw-latency-url: http://www.gstatic.com/generate_204

cfw-conn-break-strategy:
  proxy: none
  profile: true
  mode: false

cfw-proxies-order: default
