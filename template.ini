;规则集定义
[custom]
clash_rule_base=https://raw.githubusercontent.com/loststar/clash-template/main/GeneralClashConfig.yml

;=== 高阶安全与性能设置 ===
; 排除不安全/低质量节点 (流量倍率、过期、官网等)
exclude_remarks=(到期|剩余|时间|官网|产品|套餐|重置|群|频道|倍率|x\d+|×\d+)

; 节点去重 - 根据服务器地址+端口去重
remove_duplicates=true

;节点重命名 - 统一添加地区标签
; 美国
rename=波特兰@美国
rename=达拉斯@美国
rename=俄勒冈@美国
rename=凤凰城@美国
rename=费利蒙@美国
rename=硅谷@美国
rename=拉斯维加斯@美国
rename=洛杉矶@美国
rename=圣何塞@美国
rename=圣克拉拉@美国
rename=西雅图@美国
rename=芝加哥@美国
rename=US@美国
rename=United States@美国
; 日本
rename=东京@日本
rename=大阪@日本
rename=埼玉@日本
rename=川日@日本
rename=泉日@日本
rename=沪日@日本
rename=深日@日本
rename=JP@日本
rename=Japan@日本
; 新加坡
rename=狮城@新加坡
rename=SG@新加坡
rename=Singapore@新加坡
; 香港
rename=HK@香港
rename=Hong Kong@香港
; 台湾
rename=TW@台湾
rename=Taiwan@台湾

;规则集来源
; 拦截(优先处理,避免浪费资源)
ruleset=🕳️ 黑洞,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🕳️ 黑洞,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
ruleset=🕳️ 黑洞,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanEasyListChina.list

; Teams 必须在 Microsoft 之前,避免被覆盖
ruleset=📊 Teams,https://raw.githubusercontent.com/loststar/clash-template/main/Teams.list
ruleset=🪟 Microsoft,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Microsoft/Microsoft.list

; AI
ruleset=🤖 AI,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Gemini.list
ruleset=🤖 AI,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/OpenAi.list
ruleset=🤖 AI,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/AI.list

; 代理
ruleset=✈️ 代理,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list
ruleset=✈️ 代理,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/LinkedIn/LinkedIn.list

; 直连
ruleset=➡️ 直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=➡️ 直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=➡️ 直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=➡️ 直连,[]GEOIP,CN,no-resolve

; 漏网之鱼
ruleset=🐟 漏网之鱼,[]FINAL

;策略组定义
custom_proxy_group=📊 Teams`select`[]🐸 手动切换`[]DIRECT
custom_proxy_group=🪟 Microsoft`select`[]⚡ 新日混合`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🐸 手动切换`[]DIRECT
custom_proxy_group=✈️ 代理`select`[]🚀 自动切换`[]♻️ 自动选择`[]🐸 手动切换`[]DIRECT
custom_proxy_group=🤖 AI`select`[]🇺🇸 美国节点`[]⚡ 新日混合`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🐸 手动切换`[]DIRECT
custom_proxy_group=➡️ 直连`select`[]DIRECT
custom_proxy_group=🕳️ 黑洞`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 自动切换`[]♻️ 自动选择`[]🐸 手动切换`[]DIRECT

; 区域间 fallback: 按优先级切换区域 (新日混合 → 台湾 → 美国 → 香港)
custom_proxy_group=🚀 自动切换`fallback`[]⚡ 新日混合`[]🇹🇼 台湾节点`[]🇺🇸 美国节点`[]🇭🇰 香港节点`http://www.gstatic.com/generate_204`120,,2000


;按地区分类的节点 - 匹配标准化后的标签
; 格式: url-test`正则`测试URL`间隔(秒)`容差(ms)`超时(ms)
custom_proxy_group=🇺🇸 美国节点`url-test`美国`http://www.gstatic.com/generate_204`120,50,2000
custom_proxy_group=🇯🇵 日本节点`url-test`日本`http://www.gstatic.com/generate_204`120,50,2000
custom_proxy_group=🇸🇬 新加坡节点`url-test`新加坡`http://www.gstatic.com/generate_204`120,50,2000
; 日本+新加坡组合 - 两者同等优先级，自动选择延迟最低的
custom_proxy_group=⚡ 新日混合`url-test`日本|新加坡`http://www.gstatic.com/generate_204`120,50,2000
custom_proxy_group=🇭🇰 香港节点`url-test`香港`http://www.gstatic.com/generate_204`120,50,2000
custom_proxy_group=🇹🇼 台湾节点`url-test`台湾`http://www.gstatic.com/generate_204`120,50,2000

custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`120,50,2000
custom_proxy_group=🐸 手动切换`select`.*

;=== 高阶功能设置 ===
;启用自定义规则集
enable_rule_generator=true
overwrite_original_rules=true

; 启用 UDP 转发
udp=true

; 启用 TCP Fast Open
tfo=true

; 跳过证书验证 (不建议开启，除非节点有问题)
;skip_cert_verify=true

; 启用 TLS 1.3
;tls13=true